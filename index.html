<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="shortcut icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f7fb" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Smart Sauna</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Lato:wght@100;300;400;700&family=Montserrat:wght@100..900&family=Open+Sans:wght@300..800&family=Oswald:wght@200..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Raleway:wght@100..900&family=Roboto:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const WATCHDOG_ID = 'smart-sauna-boot-watchdog';
        const AUTO_SOFT_REPAIR_KEY = '__smart_sauna_auto_soft_repair_ts__';
        const AUTO_SOFT_REPAIR_WINDOW_MS = 60000;
        const STORAGE_PREFIXES = [
          'tunet_',
          'ha_',
          '__smart_sauna_',
        ];
        const SOFT_STORAGE_KEYS = [
          'tunet_shared_dashboard_cache',
          'tunet_shared_dashboard_profiles_cache',
          'tunet_active_page',
          'tunet_calendar_modal_selection',
        ];

        const readStorageValue = (key) => {
          try {
            return window.localStorage ? window.localStorage.getItem(key) || '' : '';
          } catch {
            return '';
          }
        };

        const sendClientLog = (event, details = {}, level = 'info') => {
          try {
            const payload = {
              event,
              level,
              href: window.location.href,
              page: window.location.pathname,
              visibilityState: document.visibilityState || '',
              isStandalone: Boolean(window.navigator.standalone || window.matchMedia?.('(display-mode: standalone)')?.matches),
              hasAuthToken: Boolean(readStorageValue('tunet_app_auth_token')),
              clientId: readStorageValue('tunet_client_id'),
              theme: readStorageValue('tunet_theme'),
              details,
            };
            const body = JSON.stringify(payload);
            const blob = new Blob([body], { type: 'application/json' });
            if (window.navigator.sendBeacon && window.navigator.sendBeacon('/api/client-log', blob)) return;
            window.fetch('/api/client-log', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body,
              keepalive: true,
            }).catch(() => {});
          } catch {
            // Diagnostic logging must never block boot.
          }
        };

        window.__SMART_SAUNA_CLIENT_LOG__ = sendClientLog;
        sendClientLog('boot.html.start', {
          readyState: document.readyState,
          userAgent: window.navigator.userAgent,
        });

        const getRoot = () => document.getElementById('root');
        const appHasRendered = () => {
          const root = getRoot();
          return Boolean(root && root.childElementCount > 0 && root.textContent.trim().length > 0);
        };

        const removeWatchdog = () => {
          const existing = document.getElementById(WATCHDOG_ID);
          if (existing) existing.remove();
        };

        const storageMatches = (key, repairMode) => {
          if (repairMode === 'soft') {
            return SOFT_STORAGE_KEYS.some((prefix) => key === prefix || key.startsWith(`${prefix}::`));
          }
          return STORAGE_PREFIXES.some((prefix) => key.startsWith(prefix));
        };

        const repairStorage = (repairMode) => {
          [window.localStorage, window.sessionStorage].forEach((storage) => {
            if (!storage) return;
            try {
              Array.from({ length: storage.length }, (_, index) => storage.key(index))
                .filter((key) => key && storageMatches(key, repairMode))
                .forEach((key) => storage.removeItem(key));
            } catch {
              // Best effort recovery only.
            }
          });
        };

        const tryAutoSoftRepair = () => {
          try {
            const now = Date.now();
            const lastRepair = Number(window.sessionStorage.getItem(AUTO_SOFT_REPAIR_KEY) || 0);
            if (Number.isFinite(lastRepair) && now - lastRepair < AUTO_SOFT_REPAIR_WINDOW_MS) return false;
            window.sessionStorage.setItem(AUTO_SOFT_REPAIR_KEY, String(now));
            sendClientLog('boot.auto_soft_repair', { reason: 'boot-timeout' }, 'warn');
            repairStorage('soft');
            window.location.reload();
            return true;
          } catch {
            return false;
          }
        };

        const showWatchdog = (reason) => {
          if (appHasRendered() || document.getElementById(WATCHDOG_ID)) return;
          sendClientLog('boot.watchdog.show', { reason }, 'warn');

          const overlay = document.createElement('div');
          overlay.id = WATCHDOG_ID;
          overlay.setAttribute('role', 'dialog');
          overlay.setAttribute('aria-live', 'polite');
          overlay.style.cssText = [
            'position:fixed',
            'inset:0',
            'z-index:2147483647',
            'display:flex',
            'align-items:center',
            'justify-content:center',
            'padding:24px',
            'background:#0b1220',
            'color:#f8fafc',
            'font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif',
          ].join(';');

          overlay.innerHTML = `
            <div style="width:min(420px,100%);border:1px solid rgba(148,163,184,.32);border-radius:20px;padding:24px;background:rgba(15,23,42,.94);box-shadow:0 24px 80px rgba(0,0,0,.38)">
              <div style="font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#94a3b8;font-weight:800;margin-bottom:10px">Smart Sauna</div>
              <h1 style="font-size:22px;line-height:1.2;margin:0 0 10px;font-weight:750">Appen startet ikke</h1>
              <p style="font-size:14px;line-height:1.55;margin:0 0 18px;color:#cbd5e1">Dette kan skje hvis iOS har beholdt gammel app-cache eller lokal dashboard-state. Serverdata blir ikke slettet.</p>
              <div style="display:grid;gap:10px">
                <button data-action="reload" style="border:0;border-radius:12px;padding:13px 14px;background:#38bdf8;color:#082f49;font-weight:800;font-size:14px">Last inn pa nytt</button>
                <button data-action="soft-repair" style="border:1px solid rgba(148,163,184,.38);border-radius:12px;padding:13px 14px;background:rgba(148,163,184,.12);color:#f8fafc;font-weight:750;font-size:14px">Reparer dashboard-cache</button>
                <button data-action="full-repair" style="border:1px solid rgba(251,113,133,.38);border-radius:12px;padding:13px 14px;background:rgba(127,29,29,.28);color:#fecdd3;font-weight:750;font-size:14px">Nullstill appdata og logg inn pa nytt</button>
              </div>
              <p style="font-size:11px;line-height:1.45;margin:14px 0 0;color:#94a3b8">Kode: ${String(reason || 'boot-timeout')}</p>
            </div>
          `;

          overlay.addEventListener('click', (event) => {
            const action = event.target && event.target.getAttribute('data-action');
            if (action === 'reload') {
              sendClientLog('boot.watchdog.reload', { reason });
              window.location.reload();
            }
            if (action === 'soft-repair') {
              sendClientLog('boot.watchdog.soft_repair', { reason }, 'warn');
              repairStorage('soft');
              window.location.reload();
            }
            if (action === 'full-repair') {
              sendClientLog('boot.watchdog.full_repair', { reason }, 'warn');
              repairStorage('full');
              window.location.reload();
            }
          });

          document.body.appendChild(overlay);
        };

        window.__SMART_SAUNA_HIDE_BOOT_WATCHDOG__ = removeWatchdog;
        window.__SMART_SAUNA_SHOW_BOOT_WATCHDOG__ = showWatchdog;

        window.addEventListener('error', (event) => {
          const target = event && event.target;
          if (target && target.tagName === 'SCRIPT') {
            sendClientLog('boot.script_load_failed', { src: target.src || '' }, 'error');
            showWatchdog('script-load-failed');
          }
        }, true);

        const root = getRoot();
        if (root && window.MutationObserver) {
          new MutationObserver(() => {
            if (appHasRendered()) removeWatchdog();
          }).observe(root, { childList: true, subtree: true, characterData: true });
        }

        window.setTimeout(() => {
          if (appHasRendered()) return;
          if (tryAutoSoftRepair()) return;
          showWatchdog('boot-timeout');
        }, 9000);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
